<!-- BidWise Auction Platform - Login Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BidWise</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Navbar -->
    <nav>
        <div class="nav-container">
            <a class="logo" href="/">BidWise</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/register">Register</a></li>
                <button id="themeToggle">🌙</button>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="form-container" style="max-width: 450px; margin-top: 4rem;">
            <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Welcome Back</h2>
            
            <!-- Demo Credentials Info -->
            <div class="demo-credentials">
                <h4>Demo Login Credentials</h4>
                <p><strong>User Email:</strong> user@example.com</p>
                <p><strong>Password:</strong> password123</p>
                <p><strong>Admin Email:</strong> admin@example.com</p>
                <p><strong>Password:</strong> adminpass123</p>
            </div>

            <!-- Login Form -->
            <form method="post" style="display: flex; flex-direction: column; gap: 1rem;">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="user@example.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <div class="form-group">
                    <label class="checkbox-label">
                        <input type="checkbox" name="admin" value="1">
                        <span style="margin-left: 0.5rem;">Login as Admin</span>
                    </label>
                </div>

                <button type="submit" class="form-submit" style="margin-top: 1rem;">Sign In</button>
            </form>

            <!-- Register Link -->
            <div class="form-link">
                Don't have an account yet? <a href="/register">Create one now</a>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
