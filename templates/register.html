<!-- BidWise Auction Platform - Register Page -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - BidWise</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Navbar -->
    <nav>
        <div class="nav-container">
            <a class="logo" href="/">BidWise</a>
            <ul class="nav-links">
                <li><a href="/">Home</a></li>
                <li><a href="/login">Login</a></li>
                <button id="themeToggle">🌙</button>
            </ul>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <div class="form-container" style="max-width: 450px; margin-top: 4rem;">
            <h2 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Create Account</h2>
            
            <p style="text-align: center; opacity: 0.7; margin-bottom: 2rem;">Join BidWise and start bidding today</p>

            <!-- Register Form -->
            <form method="post" style="display: flex; flex-direction: column; gap: 1rem;">
                <div class="form-group">
                    <label for="fullname">Full Name</label>
                    <input type="text" id="fullname" name="fullname" placeholder="Your Full Name" required>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" name="email" placeholder="your@email.com" required>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="form-submit" style="margin-top: 1rem;">Create Account</button>
            </form>

            <!-- Login Link -->
            <div class="form-link">
                Already have an account? <a href="/login">Sign in here</a>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div id="toastContainer"></div>

    <!-- Scripts -->
    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
